<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tetris.css">
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>

<div class="wrapper" id="wrapper">
  <div class="game-area">
    <div class="title-area">
      <div class="title">TETRIS</div>
      <div class="title-sub">PREMIUM ARCADE</div>
    </div>

    <div class="board-frame">
      <div class="board-inner" style="position:relative;">
        <canvas id="board" width="300" height="600"></canvas>

        <!-- Combo popup -->
        <div class="combo-popup" id="combo-popup"></div>

        <!-- Line clear flash -->
        <div class="line-flash" id="line-flash"></div>

        <!-- Start overlay -->
        <div class="overlay" id="start-overlay">
          <div class="overlay-title">TETRIS</div>
          <div class="controls-grid">
            <div class="ctrl-key">← →</div><div class="ctrl-label">이동</div>
            <div class="ctrl-key">↑</div><div class="ctrl-label">회전</div>
            <div class="ctrl-key">↓</div><div class="ctrl-label">소프트 드롭</div>
            <div class="ctrl-key">SPACE</div><div class="ctrl-label">하드 드롭</div>
            <div class="ctrl-key">P</div><div class="ctrl-label">일시정지</div>
            <div class="ctrl-key">M</div><div class="ctrl-label">음소거</div>
          </div>
          <div class="blink">PRESS SPACE TO START</div>
        </div>

        <!-- Game over overlay -->
        <div class="overlay hidden" id="gameover-overlay">
          <div class="overlay-title">GAME OVER</div>
          <div class="overlay-score">SCORE: <span id="final-score">0</span></div>
          <div class="overlay-sub">BEST: <span id="best-score">0</span></div>
          <div class="blink">PRESS SPACE TO RETRY</div>
        </div>

        <!-- Pause overlay -->
        <div class="overlay hidden" id="pause-overlay">
          <div class="overlay-title">PAUSED</div>
          <div class="blink">PRESS P TO CONTINUE</div>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-chip">TIME <span id="time-display">00:00</span></div>
      <div class="stat-chip">PIECES <span id="pieces-display">0</span></div>
      <div class="stat-chip">PPM <span id="ppm-display">0</span></div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-label">SCORE</div>
      <div class="panel-value score-val" id="score-display">000000</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">BEST</div>
      <div class="panel-value" id="best-display">000000</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">LEVEL</div>
      <div class="panel-value" id="level-display">1</div>
      <div class="level-bar"><div class="level-fill" id="level-fill" style="width:0%"></div></div>
    </div>
    <div class="panel-box">
      <div class="panel-label">LINES</div>
      <div class="panel-value" id="lines-display">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">NEXT</div>
      <canvas id="next-canvas" width="120" height="80"></canvas>
    </div>
    <div class="panel-box">
      <button class="sound-btn" id="mute-btn" onclick="toggleMute()">
        <span class="icon">🔊</span>
        <span class="key-hint">M</span>
      </button>
    </div>
  </div>
</div>

<script src="tetris.js"></script>
</body>
</html>
